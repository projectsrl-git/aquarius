* Identificazione ID-Terminale POS
*
* IDTERMINALE.<id cassa>.<tipo pagamento>=<id terminale pos>
*
* <id cassa>	  = codice identificativo della cassa
*
* <tipo pagamento>= 3 carta di credito
*                   4 bancomat
*
IDTERMINALE.001.3=89020068
IDTERMINALE.001.4=89020068

* parametri configurazione Terminale POS
*
* <parametro>.<id terminale pos>=valore parametro
*
* SIMULAZIONE.<id terminale pos>= SI - imposta la modalita' di 
*                                      simulazione e il PC/CASSA non
*                                      comunica col POS
*                                 NO - il PC/CASSA e' connesso al POS
*
* COM.<id terminale pos>        = 1/2/3/4  e' il numero della porta seriale
*                                 a cui il POS e' collegato
SIMULAZIONE.89020068=NO
COM.89020068=3
VELOCITA.89020068=9600
PARITA.89020068=N
BITDATO.89020068=8
BITSTOP.89020068=1
